name: "A. Release: maui-iap"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - current
        default: patch
      prerelease:
        description: "Publish as prerelease (-rc.1)"
        required: false
        default: false
        type: boolean
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  XCODE_VERSION: 16.4
  XCODEGEN_VERSION: 2.45.4
  XCODEGEN_SHA256: 090ec29491aad50aec10631bf6e62253fed733c50f3aab0f5ffc86bc170bdbef

jobs:
  validate:
    name: Validate (net9.0 / net10.0 shared)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: "10.0.x"

      # The shared `net9.0` / `net10.0` builds catch Types.cs / public-API regressions
      # without needing the MAUI / android / ios workloads. Two things make
      # this work — see ci-maui-iap.yml for the same pattern with details.
      # Note: `-p:TargetFrameworks=...` is PLURAL (overrides the project's
      # multi-target list); the singular `-p:TargetFramework=...` and `-f`
      # leave the implicit restore walking all TFMs.
      - name: Build library (shared)
        run: |
          dotnet build libraries/maui-iap/src/OpenIap.Maui/OpenIap.Maui.csproj -p:TargetFrameworks=net9.0
          dotnet build libraries/maui-iap/src/OpenIap.Maui/OpenIap.Maui.csproj -p:TargetFrameworks=net10.0

  validate-multitarget:
    name: Validate (net9.0/net10.0 platform TFMs)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui --skip-sign-check

      - name: Install xcodegen
        run: bash scripts/install-xcodegen.sh "$XCODEGEN_VERSION"

      # Native artifacts must exist before the binding csprojs can compile.
      - name: Build OpenIAP.xcframework (Apple)
        run: bash packages/apple/scripts/build-xcframework.sh

      - name: Build Play AAR (Google)
        working-directory: packages/google
        run: ./gradlew :openiap:assemblePlayRelease

      - name: Build MAUI Android module AAR
        working-directory: libraries/maui-iap/android
        run: ../../../packages/google/gradlew :openiap:assembleRelease

      # OpenIap.Maui.csproj includes net9.0-android, net10.0-android,
      # net9.0-ios, net10.0-ios, net9.0-maccatalyst, and net10.0-maccatalyst.
      - name: Build all target frameworks
        run: dotnet build libraries/maui-iap/src/OpenIap.Maui/OpenIap.Maui.csproj

  publish:
    needs: [validate, validate-multitarget]
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui --skip-sign-check

      - name: Install xcodegen
        run: bash scripts/install-xcodegen.sh "$XCODEGEN_VERSION"

      - name: Calculate new version
        id: version
        run: |
          CSPROJ=libraries/maui-iap/src/OpenIap.Maui/OpenIap.Maui.csproj
          CURRENT_VERSION=$(sed -n -E 's|.*<PackageVersion>([^<]+)</PackageVersion>.*|\1|p' "$CSPROJ" | head -n 1)
          if [ -z "$CURRENT_VERSION" ]; then
            CURRENT_VERSION=$(sed -n -E 's|.*<Version>([^<]+)</Version>.*|\1|p' "$CSPROJ" | head -n 1)
          fi
          if [ -z "$CURRENT_VERSION" ]; then
            echo "❌ Unable to read MAUI package version from $CSPROJ"
            exit 1
          fi
          echo "Current version: $CURRENT_VERSION"

          VERSION_TYPE="${{ inputs.version }}"
          IS_PRERELEASE="${{ inputs.prerelease }}"
          BASE_VERSION="${CURRENT_VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          if [ "$VERSION_TYPE" = "current" ]; then
            NEW_VERSION="$CURRENT_VERSION"
            echo "Using current version (no bump): $NEW_VERSION"
            echo "skip_version_commit=true" >> $GITHUB_OUTPUT
          elif [ "$IS_PRERELEASE" = "true" ]; then
            case "$VERSION_TYPE" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-rc.1"
          else
            IS_RC=$(echo "$CURRENT_VERSION" | grep -c '\-rc\.' || true)
            if [ "$IS_RC" -gt 0 ] && [ "$VERSION_TYPE" = "patch" ]; then
              NEW_VERSION="${BASE_VERSION}"
            else
              case "$VERSION_TYPE" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          if [[ "$NEW_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if tag already exists
        id: check_tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SKIP_VERSION_COMMIT: ${{ steps.version.outputs.skip_version_commit }}
        run: |
          if git rev-parse "maui-iap-$VERSION" >/dev/null 2>&1; then
            if [ "$SKIP_VERSION_COMMIT" = "true" ]; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "⚠️ Tag maui-iap-$VERSION already exists. Will reuse existing tag (current mode)."
            else
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "❌ Tag maui-iap-$VERSION already exists. Use 'current' to retry with existing version."
              exit 1
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✓ Tag maui-iap-$VERSION does not exist, proceeding with release"
          fi

      - name: Checkout release tag (current version)
        if: steps.version.outputs.skip_version_commit == 'true' && steps.check_tag.outputs.exists == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          RELEASE_TAG="maui-iap-$VERSION"
          git checkout "$RELEASE_TAG"

      - name: Update package version in OpenIap.Maui.csproj
        if: steps.version.outputs.skip_version_commit != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CSPROJ=libraries/maui-iap/src/OpenIap.Maui/OpenIap.Maui.csproj
          if grep -q "<PackageVersion>" "$CSPROJ"; then
            sed -i '' -E "s|<PackageVersion>[^<]*</PackageVersion>|<PackageVersion>$VERSION</PackageVersion>|" "$CSPROJ"
          elif grep -q "<Version>" "$CSPROJ"; then
            sed -i '' -E "s|<Version>[^<]*</Version>|<Version>$VERSION</Version>|" "$CSPROJ"
          else
            # Insert immediately after PackageId so package metadata stays grouped.
            awk -v ver="$VERSION" '
              !inserted && /<PackageId>/ {
                print
                print "    <PackageVersion>" ver "</PackageVersion>"
                inserted = 1
                next
              }
              { print }
            ' "$CSPROJ" > "$CSPROJ.tmp"
            mv "$CSPROJ.tmp" "$CSPROJ"
          fi
          echo "Updated csproj package version to $VERSION"

      - name: Sync generated version metadata
        if: steps.version.outputs.skip_version_commit != 'true'
        run: ./scripts/sync-versions.sh

      - name: Commit version updates
        if: steps.version.outputs.skip_version_commit != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add libraries/maui-iap/src/OpenIap.Maui/OpenIap.Maui.csproj
          git add packages/docs/src/generated/version-metadata.json

          if git diff --staged --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore(maui): bump version to $VERSION"
            for i in 1 2 3; do
              if ! git pull --rebase origin main; then
                echo "❌ Rebase conflict while updating MAUI package version"
                exit 1
              fi
              if git push origin main; then
                echo "✅ Pushed version update"
                break
              else
                if [ $i -lt 3 ]; then
                  echo "⚠️ Push failed, retrying"
                  sleep $((i * 2))
                else
                  echo "❌ Failed to push after 3 attempts"
                  exit 1
                fi
              fi
            done
          fi

      # Re-build native artifacts on the publish runner; the validate-multitarget
      # job runs in a separate workspace.
      - name: Build OpenIAP.xcframework (Apple)
        run: bash packages/apple/scripts/build-xcframework.sh

      - name: Build Play AAR (Google)
        working-directory: packages/google
        run: ./gradlew :openiap:assemblePlayRelease

      - name: Build MAUI Android module AAR
        working-directory: libraries/maui-iap/android
        run: ../../../packages/google/gradlew :openiap:assembleRelease

      - name: Pack NuGet package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          dotnet pack libraries/maui-iap/src/OpenIap.Maui/OpenIap.Maui.csproj \
            -c Release \
            -p:Version=$VERSION \
            -o ./nupkgs

      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "⚠️ NUGET_API_KEY secret not set. Skipping push."
            exit 0
          fi
          dotnet nuget push './nupkgs/*.nupkg' \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Generate release notes
        if: success()
        id: release_notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          RELEASE_REF="HEAD"
          if git rev-parse "maui-iap-$VERSION" >/dev/null 2>&1; then
            RELEASE_REF="maui-iap-$VERSION"
          fi
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:short)' 'refs/tags/maui-iap-*' | grep -v "$VERSION" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG..$RELEASE_REF" --pretty=format:"- %s ([\`%h\`](https://github.com/hyodotdev/openiap/commit/%H))" -- libraries/maui-iap/ packages/google/ packages/apple/ packages/gql/)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Initial release / no direct code changes — picks up the latest openiap-google / openiap-apple native library updates."
          fi
          cat > /tmp/release-notes.md <<EOF
          ## maui-iap $VERSION

          .NET MAUI / C# 12 library for the OpenIAP specification (iOS + Android + macCatalyst).

          ### What's Changed

          $CHANGELOG

          ### Installation

          \`\`\`xml
          <ItemGroup>
            <PackageReference Include="OpenIap.Maui" Version="$VERSION" />
          </ItemGroup>
          \`\`\`

          Or via the .NET CLI:

          \`\`\`bash
          dotnet add package OpenIap.Maui --version $VERSION
          \`\`\`

          ### Documentation

          - [Setup guide — .NET MAUI](https://openiap.dev/docs/setup/maui)
          - [API reference](https://openiap.dev/docs/apis)
          - [Release notes](https://openiap.dev/docs/updates/releases)

          ### Links

          - [NuGet](https://www.nuget.org/packages/OpenIap.Maui/$VERSION)
          - [GitHub (monorepo)](https://github.com/hyodotdev/openiap/tree/main/libraries/maui-iap)
          EOF

      - name: Create and push tag
        if: success()
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "maui-iap-$VERSION" >/dev/null 2>&1; then
            echo "Tag maui-iap-$VERSION already exists"
          else
            git tag -a "maui-iap-$VERSION" -m "Release maui-iap $VERSION"
            git push origin "maui-iap-$VERSION"
          fi

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v3
        with:
          tag_name: maui-iap-${{ steps.version.outputs.version }}
          name: maui-iap ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          body_path: /tmp/release-notes.md
          files: ./nupkgs/*.nupkg
