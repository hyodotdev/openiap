name: CI - react-native-iap

on:
  pull_request:
    branches: [main]
    paths:
      - 'libraries/react-native-iap/**'
      - 'packages/gql/src/generated/types.ts'
  push:
    branches: [main]
    paths:
      - 'libraries/react-native-iap/**'
      - 'packages/gql/src/generated/types.ts'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: libraries/react-native-iap

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable && corepack prepare yarn@3.6.1 --activate

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: libraries/react-native-iap/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('libraries/react-native-iap/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn lint:tsc

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable && corepack prepare yarn@3.6.1 --activate

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: libraries/react-native-iap/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('libraries/react-native-iap/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Test
        run: yarn test
