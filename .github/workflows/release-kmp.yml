name: "A. Release: kmp-iap"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - current
          - rc-bump
        default: patch
      prerelease:
        description: "Publish as prerelease (-rc.1)"
        required: false
        default: false
        type: boolean
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"
  XCODE_VERSION: 16.4

permissions:
  contents: write

jobs:
  validate-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: libraries/kmp-iap
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android targets
        run: ./gradlew :library:compileDebugKotlinAndroid --no-daemon --stacktrace

  validate-ios:
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: libraries/kmp-iap
    steps:
      - uses: actions/checkout@v7

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: |
          ./gradlew :library:build
          ./gradlew :library:allTests

      - name: Build iOS frameworks
        run: |
          ./gradlew :library:podGenIos
          ./gradlew :library:podInstallSyntheticIos
          ./gradlew :library:podBuildOpeniapIos
          ./gradlew :library:linkPodDebugFrameworkIosSimulatorArm64
          ./gradlew :library:linkPodDebugFrameworkIosArm64

  publish:
    needs: [validate-android, validate-ios]
    runs-on: macos-15
    defaults:
      run:
        working-directory: libraries/kmp-iap
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Calculate version
        id: version
        run: |
          VERSION_TYPE="${{ inputs.version }}"
          IS_PRERELEASE="${{ inputs.prerelease }}"
          CURRENT_VERSION=$(grep '^libraryVersion=' gradle.properties | cut -d'=' -f2)

          if [ "$VERSION_TYPE" = "current" ]; then
            echo "VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
            echo "VERSION=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            if [[ "$CURRENT_VERSION" == *-* ]]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          BASE_VERSION=$(echo "$CURRENT_VERSION" | sed -E 's/(-[a-zA-Z]+(\.[0-9]+)?)+$//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          if [ "$VERSION_TYPE" = "rc-bump" ]; then
            RC_NUM=$(echo "$CURRENT_VERSION" | sed -n 's/.*-rc\.\([0-9]*\)/\1/p')
            if [ -z "$RC_NUM" ]; then
              echo "::error::Current version $CURRENT_VERSION is not an rc version."
              exit 1
            fi
            VERSION="${BASE_VERSION}-rc.$((RC_NUM + 1))"
          elif [ "$IS_PRERELEASE" = "true" ]; then
            case "$VERSION_TYPE" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            VERSION="${MAJOR}.${MINOR}.${PATCH}-rc.1"
          else
            # Stable release — if current version is RC, strip prerelease without bumping
            IS_RC=$(echo "$CURRENT_VERSION" | grep -c '\-rc\.' || true)
            if [ "$IS_RC" -gt 0 ] && [ "$VERSION_TYPE" = "patch" ]; then
              VERSION="${BASE_VERSION}"
            else
              case "$VERSION_TYPE" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release tag already exists
        id: check_tag
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          VERSION_TYPE: ${{ inputs.version }}
        run: |
          RELEASE_TAG="kmp-iap-$VERSION"
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            if [ "$VERSION_TYPE" = "current" ]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "⚠️ Tag $RELEASE_TAG already exists. Will reuse existing tag (current mode)."
            else
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "❌ Tag $RELEASE_TAG already exists. Use 'current' to retry this version."
              exit 1
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✓ Tag $RELEASE_TAG does not exist"
          fi

      - name: Checkout release tag (current version)
        if: ${{ inputs.version == 'current' && steps.check_tag.outputs.exists == 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          RELEASE_TAG="kmp-iap-$VERSION"
          git checkout "$RELEASE_TAG"

      - name: Update release metadata
        if: ${{ inputs.version != 'current' }}
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          perl -0pi -e 's/^libraryVersion=.*/libraryVersion=$ENV{VERSION}/m' gradle.properties
          ./scripts/update-readme-version.sh "$VERSION"

      - name: Commit version updates
        if: ${{ inputs.version != 'current' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add gradle.properties
          if git diff --staged --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore(release): kmp-iap ${{ env.VERSION }}"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Clean build artifacts
        run: rm -rf library/build/cocoapods

      - name: Build iOS frameworks
        run: |
          ./gradlew :library:podGenIos
          ./gradlew :library:podInstallSyntheticIos
          ./gradlew :library:podBuildOpeniapIos
          ./gradlew :library:linkPodDebugFrameworkIosSimulatorArm64
          ./gradlew :library:linkPodDebugFrameworkIosArm64

      - name: Check if KMP package already published
        id: check_maven
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://repo1.maven.org/maven2/io/github/hyochan/kmp-iap/$VERSION/" || true)
          HTTP_STATUS="${HTTP_STATUS:-000}"
          case "$HTTP_STATUS" in
            200)
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "⚠️ kmp-iap $VERSION already exists on Maven Central"
              ;;
            404)
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "✓ kmp-iap $VERSION does not exist, will publish"
              ;;
            *)
              echo "❌ Unable to verify kmp-iap $VERSION on Maven Central (HTTP $HTTP_STATUS)"
              exit 1
              ;;
          esac

      - name: Publish to Maven Central
        if: steps.check_maven.outputs.exists == 'false'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :library:publishAndReleaseToMavenCentral --no-daemon --no-parallel

      - name: Create and push tag
        if: success()
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          RELEASE_TAG="kmp-iap-$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists"
          else
            git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

      - name: Generate release notes
        if: success()
        id: release_notes
        run: |
          VERSION="${{ env.VERSION }}"
          RELEASE_REF="HEAD"
          if git rev-parse "kmp-iap-$VERSION" >/dev/null 2>&1; then
            RELEASE_REF="kmp-iap-$VERSION"
          fi
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:short)' 'refs/tags/kmp-iap-*' | grep -v "$VERSION" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG..$RELEASE_REF" --pretty=format:"- %s ([\`%h\`](https://github.com/hyodotdev/openiap/commit/%H))" -- libraries/kmp-iap/ packages/google/ packages/apple/)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No direct code changes — picks up the latest openiap-google / openiap-apple native library updates. See the consolidated release notes for details."
          fi
          cat > /tmp/release-notes.md <<EOF
          ## kmp-iap $VERSION

          Kotlin Multiplatform library for the OpenIAP specification (iOS + Android).

          ### What's Changed

          $CHANGELOG

          ### Installation

          **Gradle (Kotlin DSL):**

          \`\`\`kotlin
          dependencies {
              implementation("io.github.hyochan:kmp-iap:$VERSION")
          }
          \`\`\`

          **Gradle (Groovy):**

          \`\`\`groovy
          dependencies {
              implementation 'io.github.hyochan:kmp-iap:$VERSION'
          }
          \`\`\`

          ### Documentation

          - [Setup guide — Kotlin Multiplatform](https://openiap.dev/docs/setup/kmp)
          - [API reference](https://openiap.dev/docs/apis)
          - [Release notes](https://openiap.dev/docs/updates/releases)

          ### Links

          - [Maven Central](https://central.sonatype.com/artifact/io.github.hyochan/kmp-iap/$VERSION)
          - [GitHub (monorepo)](https://github.com/hyodotdev/openiap/tree/main/libraries/kmp-iap)
          EOF

      - name: Build Android release artifacts
        if: success()
        run: ./gradlew :library:assembleRelease --no-daemon --stacktrace

      - name: Create release artifacts
        if: success()
        run: |
          mkdir -p release-artifacts
          shopt -s nullglob
          artifacts=(library/build/outputs/aar/*.aar library/build/libs/*.jar)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "::error::No KMP release artifacts found"
            exit 1
          fi
          cp "${artifacts[@]}" release-artifacts/
          zip -r release-artifacts.zip release-artifacts/

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v3
        with:
          tag_name: kmp-iap-${{ steps.version.outputs.VERSION }}
          name: kmp-iap ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          body_path: /tmp/release-notes.md
          files: libraries/kmp-iap/release-artifacts.zip
