name: "A. Release: kmp-iap"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - current
          - rc-bump
        default: patch
      prerelease:
        description: "Publish as prerelease (-rc.1)"
        required: false
        default: false
        type: boolean
      create_release:
        description: "Also create a GitHub Release"
        required: false
        default: true
        type: boolean

concurrency:
  group: release-publish
  cancel-in-progress: false

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"

permissions:
  contents: write

jobs:
  validate-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: libraries/kmp-iap
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android targets
        run: ./gradlew :library:compileDebugKotlinAndroid --no-daemon --stacktrace

  validate-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: libraries/kmp-iap
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: |
          ./gradlew :library:build
          ./gradlew :library:allTests

      - name: Build iOS frameworks
        run: |
          ./gradlew :library:podGenIos
          ./gradlew :library:updatePodspecDependency
          ./gradlew :library:podInstallSyntheticIos
          ./gradlew :library:podBuildOpeniapIos
          ./gradlew :library:linkPodDebugFrameworkIosSimulatorArm64
          ./gradlew :library:linkPodDebugFrameworkIosArm64

  publish:
    needs: [validate-android, validate-ios]
    runs-on: macos-latest
    defaults:
      run:
        working-directory: libraries/kmp-iap
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Calculate version
        id: version
        run: |
          VERSION_TYPE="${{ inputs.version }}"
          IS_PRERELEASE="${{ inputs.prerelease }}"
          CURRENT_VERSION=$(grep '^libraryVersion=' gradle.properties | cut -d'=' -f2)

          if [ "$VERSION_TYPE" = "current" ]; then
            echo "VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
            echo "VERSION=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            if [[ "$CURRENT_VERSION" == *-* ]]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          BASE_VERSION=$(echo "$CURRENT_VERSION" | sed -E 's/(-[a-zA-Z]+(\.[0-9]+)?)+$//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          if [ "$VERSION_TYPE" = "rc-bump" ]; then
            RC_NUM=$(echo "$CURRENT_VERSION" | sed -n 's/.*-rc\.\([0-9]*\)/\1/p')
            if [ -z "$RC_NUM" ]; then
              echo "::error::Current version $CURRENT_VERSION is not an rc version."
              exit 1
            fi
            VERSION="${BASE_VERSION}-rc.$((RC_NUM + 1))"
          elif [ "$IS_PRERELEASE" = "true" ]; then
            case "$VERSION_TYPE" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            VERSION="${MAJOR}.${MINOR}.${PATCH}-rc.1"
          else
            # Stable release — if current version is RC, strip prerelease without bumping
            IS_RC=$(echo "$CURRENT_VERSION" | grep -c '\-rc\.' || true)
            if [ "$IS_RC" -gt 0 ] && [ "$VERSION_TYPE" = "patch" ]; then
              VERSION="${BASE_VERSION}"
            else
              case "$VERSION_TYPE" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          sed -i '' "s/^libraryVersion=.*/libraryVersion=$VERSION/" gradle.properties

      - name: Update version in gradle.properties
        if: ${{ inputs.version != 'current' }}
        run: |
          sed -i '' "s/^libraryVersion=.*/libraryVersion=${{ env.VERSION }}/" gradle.properties

      - name: Regenerate podspec with correct version
        if: ${{ inputs.version != 'current' }}
        run: ./gradlew :library:podspec

      - name: Update podspec to read openiap-versions.json dynamically
        if: ${{ inputs.version != 'current' }}
        run: ./gradlew :library:updatePodspecDependency

      - name: Update README version
        if: ${{ inputs.version != 'current' }}
        run: ./gradlew :library:updateReadmeVersion

      - name: Commit version updates
        if: ${{ inputs.version != 'current' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md library/library.podspec gradle.properties
          git diff --staged --quiet || git commit -m "chore(release): kmp-iap ${{ env.VERSION }}"
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true
          git push || echo "No changes to commit"

      - name: Clean build artifacts
        run: rm -rf library/build/cocoapods

      - name: Build iOS frameworks
        run: |
          ./gradlew :library:podGenIos
          ./gradlew :library:updatePodspecDependency
          ./gradlew :library:podInstallSyntheticIos
          ./gradlew :library:podBuildOpeniapIos
          ./gradlew :library:linkPodDebugFrameworkIosSimulatorArm64
          ./gradlew :library:linkPodDebugFrameworkIosArm64

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :library:publishAndReleaseToMavenCentral --no-daemon --no-parallel

      - name: Generate release notes
        if: inputs.create_release && success()
        id: release_notes
        run: |
          VERSION="${{ env.VERSION }}"
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:short)' 'refs/tags/kmp-iap-*' | grep -v "$VERSION" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s ([\`%h\`](https://github.com/hyodotdev/openiap/commit/%H))" -- libraries/kmp-iap/ packages/google/ packages/apple/)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No direct code changes — picks up the latest openiap-google / openiap-apple native library updates. See the consolidated release notes for details."
          fi
          cat > /tmp/release-notes.md <<EOF
          ## kmp-iap $VERSION

          Kotlin Multiplatform library for the OpenIAP specification (iOS + Android).

          ### What's Changed

          $CHANGELOG

          ### Installation

          **Gradle (Kotlin DSL):**

          \`\`\`kotlin
          dependencies {
              implementation("io.github.hyochan.openiap:kmp-iap:$VERSION")
          }
          \`\`\`

          **Gradle (Groovy):**

          \`\`\`groovy
          dependencies {
              implementation 'io.github.hyochan.openiap:kmp-iap:$VERSION'
          }
          \`\`\`

          ### Documentation

          - [Setup guide — Kotlin Multiplatform](https://www.openiap.dev/docs/setup/kmp)
          - [API reference](https://www.openiap.dev/docs/apis)
          - [Release notes](https://www.openiap.dev/docs/updates/releases)

          ### Links

          - [Maven Central](https://central.sonatype.com/artifact/io.github.hyochan.openiap/kmp-iap/$VERSION)
          - [GitHub (monorepo)](https://github.com/hyodotdev/openiap/tree/main/libraries/kmp-iap)
          EOF

      - name: Create GitHub Release
        if: inputs.create_release && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kmp-iap-${{ steps.version.outputs.VERSION }}
          name: kmp-iap ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          body_path: /tmp/release-notes.md

      - name: Create release artifacts
        if: inputs.create_release && success()
        run: |
          mkdir -p release-artifacts
          cp library/build/outputs/aar/*.aar release-artifacts/ || true
          cp library/build/libs/*.jar release-artifacts/ || true
          zip -r release-artifacts.zip release-artifacts/

      - name: Upload release artifacts
        if: inputs.create_release && success()
        uses: softprops/action-gh-release@v2
        with:
          files: libraries/kmp-iap/release-artifacts.zip
          tag_name: kmp-iap-${{ steps.version.outputs.VERSION }}
          name: kmp-iap ${{ steps.version.outputs.VERSION }}
