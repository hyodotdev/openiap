name: "A. Release: flutter_inapp_purchase"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - current
          - rc-bump
        default: patch
      prerelease:
        description: "Publish as prerelease (-rc.1)"
        required: false
        default: false
        type: boolean
      create_release:
        description: "Also create a GitHub Release"
        required: false
        default: true
        type: boolean

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  validate-android:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: libraries/flutter_inapp_purchase
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.x"

      - name: Install dependencies
        run: flutter pub get

      - name: Lint
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Prepare example env
        working-directory: libraries/flutter_inapp_purchase/example
        run: cp env.example env

      - name: Build Android
        working-directory: libraries/flutter_inapp_purchase/example
        run: flutter build apk --debug

  validate-ios:
    if: github.ref == 'refs/heads/main'
    runs-on: macos-15
    timeout-minutes: 60
    env:
      XCODE_VERSION: 16.4
    defaults:
      run:
        working-directory: libraries/flutter_inapp_purchase
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.x"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: libraries/flutter_inapp_purchase/example
        run: flutter pub get

      - name: Prepare example env
        working-directory: libraries/flutter_inapp_purchase/example
        run: cp env.example env

      - name: Install CocoaPods dependencies
        working-directory: libraries/flutter_inapp_purchase/example/ios
        run: pod install --repo-update

      - name: Build iOS
        working-directory: libraries/flutter_inapp_purchase/example/ios
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

  deploy:
    needs: [validate-android, validate-ios]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libraries/flutter_inapp_purchase
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPENDENCY_UPDATE_PAT }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.x"

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Git user
        run: |
          git config user.name "flutter-iap bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate version
        id: bump
        run: |
          VERSION_TYPE="${{ inputs.version }}"
          IS_PRERELEASE="${{ inputs.prerelease }}"
          CURRENT_VERSION=$(awk '/^version:/{print $2; exit}' pubspec.yaml)

          if [ "$VERSION_TYPE" = "current" ]; then
            NEW_VERSION="$CURRENT_VERSION"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "prev_version=${CURRENT_VERSION%%[-+]*}" >> "$GITHUB_OUTPUT"
            if [[ "$NEW_VERSION" == *-* ]]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          BASE_VERSION="${CURRENT_VERSION%%[-+]*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          if [ "$VERSION_TYPE" = "rc-bump" ]; then
            RC_NUM=$(echo "$CURRENT_VERSION" | sed -n 's/.*-rc\.\([0-9]*\)/\1/p')
            if [ -z "$RC_NUM" ]; then
              echo "::error::Current version $CURRENT_VERSION is not an rc version."
              exit 1
            fi
            NEW_VERSION="${BASE_VERSION}-rc.$((RC_NUM + 1))"
          elif [ "$IS_PRERELEASE" = "true" ]; then
            # major/minor/patch + prerelease → X.Y.Z-rc.1
            case "$VERSION_TYPE" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-rc.1"
          else
            # Stable release — if current version is RC, strip prerelease without bumping
            IS_RC=$(echo "$CURRENT_VERSION" | grep -c '\-rc\.' || true)
            if [ "$IS_RC" -gt 0 ] && [ "$VERSION_TYPE" = "patch" ]; then
              NEW_VERSION="${BASE_VERSION}"
            else
              case "$VERSION_TYPE" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "prev_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$NEW_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate CHANGELOG entry
        if: ${{ inputs.version != 'current' }}
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
          PREV_VERSION: ${{ steps.bump.outputs.prev_version }}
        run: |
          DATE=$(date +%Y-%m-%d)
          CHANGES=""
          if git rev-parse "$PREV_VERSION" >/dev/null 2>&1; then
            PR_LINES=$(git log "${PREV_VERSION}..HEAD" --merges --pretty=format:"%s" | \
              sed -n 's/^Merge pull request #\([0-9]*\) from .*/\1/p')
            for PR_NUM in $PR_LINES; do
              PR_TITLE=$(git log --all --grep="Merge pull request #${PR_NUM}" --pretty=format:"%s" | head -1 | sed "s|Merge pull request #${PR_NUM} from [^ ]* ||")
              if [ -n "$PR_TITLE" ]; then
                CHANGES="${CHANGES}- ${PR_TITLE} (#${PR_NUM})\n"
              fi
            done
            if [ -z "$CHANGES" ]; then
              CHANGES=$(git log "${PREV_VERSION}..HEAD" --no-merges --pretty=format:"- %s" | head -20)
              CHANGES="${CHANGES}\n"
            fi
          else
            CHANGES="- Initial release\n"
          fi
          ENTRY="## ${NEW_VERSION} (${DATE})\n\n${CHANGES}"
          if [ -f CHANGELOG.md ]; then
            EXISTING=$(cat CHANGELOG.md)
            printf "%b" "# Changelog\n\n${ENTRY}\n${EXISTING#"# Changelog"*$'\n'}" > CHANGELOG.md
          else
            printf "%b" "# Changelog\n\n${ENTRY}" > CHANGELOG.md
          fi

      - name: Commit and tag
        if: ${{ inputs.version != 'current' }}
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add pubspec.yaml
          [ -f CHANGELOG.md ] && git add CHANGELOG.md
          git commit -m "chore(release): flutter_inapp_purchase ${NEW_VERSION}"
          git tag -a "flutter-iap-${NEW_VERSION}" -m "Release flutter-iap-${NEW_VERSION}"

      - name: Tag only (current version)
        if: ${{ inputs.version == 'current' }}
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git tag -af "flutter-iap-${NEW_VERSION}" -m "Release flutter-iap-${NEW_VERSION}"

      - name: Push commit and tags
        if: ${{ inputs.version != 'current' }}
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git push --follow-tags

      - name: Push tag (current version)
        if: ${{ inputs.version == 'current' }}
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git push origin "flutter-iap-${NEW_VERSION}" --force

      - name: Generate release notes
        if: ${{ inputs.create_release }}
        id: release_notes
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:short)' 'refs/tags/flutter-iap-*' | grep -v "$VERSION" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s ([\`%h\`](https://github.com/hyodotdev/openiap/commit/%H))" -- libraries/flutter_inapp_purchase/ packages/google/ packages/apple/)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No direct code changes — picks up the latest openiap-google / openiap-apple native library updates. See the consolidated release notes for details."
          fi
          cat > /tmp/release-notes.md <<EOF
          ## flutter_inapp_purchase $VERSION

          Flutter plugin for the OpenIAP specification.

          ### What's Changed

          $CHANGELOG

          ### Installation

          \`\`\`yaml
          # pubspec.yaml
          dependencies:
            flutter_inapp_purchase: ^$VERSION
          \`\`\`

          \`\`\`bash
          flutter pub get
          \`\`\`

          ### Documentation

          - [Setup guide — Flutter](https://www.openiap.dev/docs/setup/flutter)
          - [API reference](https://www.openiap.dev/docs/apis)
          - [Release notes](https://www.openiap.dev/docs/updates/releases)

          ### Links

          - [pub.dev](https://pub.dev/packages/flutter_inapp_purchase/versions/$VERSION)
          - [GitHub (monorepo)](https://github.com/hyodotdev/openiap/tree/main/libraries/flutter_inapp_purchase)
          EOF

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: flutter-iap-${{ steps.bump.outputs.version }}
          name: flutter_inapp_purchase ${{ steps.bump.outputs.version }}
          draft: false
          prerelease: ${{ steps.bump.outputs.is_prerelease }}
          body_path: /tmp/release-notes.md

      # pub.dev OIDC requires a tag refType, so the publish workflow must run
      # against the newly-created tag. The push:tags trigger has been
      # unreliable (tag push via PAT sometimes does not fire it), so we
      # explicitly dispatch publish-flutter.yml on the tag ref here.
      - name: Dispatch pub.dev publish on tag ref
        env:
          GH_TOKEN: ${{ secrets.DEPENDENCY_UPDATE_PAT }}
          TAG: flutter-iap-${{ steps.bump.outputs.version }}
        run: |
          gh workflow run publish-flutter.yml --ref "$TAG"
