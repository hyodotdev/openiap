name: "Publish: flutter_inapp_purchase"

on:
  push:
    tags:
      - "flutter-iap-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libraries/flutter_inapp_purchase
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.41.9"

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: flutter pub get

      - name: Android consumer build smoke test
        run: bash scripts/verify-android-consumer-build.sh

      - name: Check if pub.dev package already published
        id: check_pub
        run: |
          VERSION=$(awk '/^version:/{print $2; exit}' pubspec.yaml)
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pub.dev/api/packages/flutter_inapp_purchase/versions/$VERSION" || true)
          HTTP_STATUS="${HTTP_STATUS:-000}"
          case "$HTTP_STATUS" in
            200)
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "⚠️ flutter_inapp_purchase $VERSION already exists on pub.dev"
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              echo "✓ flutter_inapp_purchase $VERSION does not exist, will publish"
              ;;
            *)
              echo "❌ Unable to verify flutter_inapp_purchase $VERSION on pub.dev (HTTP $HTTP_STATUS)"
              exit 1
              ;;
          esac

      - name: Publish to pub.dev
        if: steps.check_pub.outputs.exists == 'false'
        run: |
          OIDC_TOKEN=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://pub.dev" \
            -H "User-Agent: actions/oidc-client" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            | jq -r '.value')
          dart pub token add https://pub.dev --env-var _PUB_TOKEN
          _PUB_TOKEN="$OIDC_TOKEN" dart pub publish --force
