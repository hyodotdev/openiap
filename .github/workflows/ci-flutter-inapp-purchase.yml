name: CI - flutter_inapp_purchase

on:
  pull_request:
    branches: [main]
    paths:
      - 'libraries/flutter_inapp_purchase/**'
      - 'packages/gql/src/generated/types.dart'
  push:
    branches: [main]
    paths:
      - 'libraries/flutter_inapp_purchase/**'
      - 'packages/gql/src/generated/types.dart'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: libraries/flutter_inapp_purchase

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Android consumer build smoke test
        run: bash scripts/verify-android-consumer-build.sh
