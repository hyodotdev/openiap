name: "A. Release: expo-iap"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - current
          - rc-bump
        default: patch
      prerelease:
        description: "Publish as prerelease (-rc.1)"
        required: false
        default: false
        type: boolean
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GRADLE_OPTS: '-Dorg.gradle.daemon=true -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError"'
    defaults:
      run:
        working-directory: libraries/expo-iap
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install example dependencies
        working-directory: libraries/expo-iap/example
        run: bun install --frozen-lockfile

      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Generate native projects (expo prebuild)
        working-directory: libraries/expo-iap/example
        run: npx expo prebuild --platform android --clean

      - name: Build Android library
        working-directory: libraries/expo-iap/example/android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a --stacktrace

  validate-ios:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      XCODE_VERSION: 16.4
    defaults:
      run:
        working-directory: libraries/expo-iap
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install example dependencies
        working-directory: libraries/expo-iap/example
        run: bun install --frozen-lockfile

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Generate native projects (expo prebuild)
        working-directory: libraries/expo-iap/example
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        working-directory: libraries/expo-iap/example/ios
        run: pod install --repo-update

      - name: Build iOS library
        working-directory: libraries/expo-iap/example/ios
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace expoiapexample.xcworkspace \
            -scheme expoiapexample \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

  deploy:
    needs: [validate-android, validate-ios]
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libraries/expo-iap
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Checkout release tag (current version)
        if: ${{ inputs.version == 'current' }}
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="expo-iap-${NEW_VERSION}"
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            git checkout "$RELEASE_TAG"
          else
            echo "Tag $RELEASE_TAG does not exist; current mode will use HEAD."
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:ci

      - name: Configure Git user
        run: |
          git config user.name "expo-iap bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          VERSION_TYPE="${{ inputs.version }}"
          IS_PRERELEASE="${{ inputs.prerelease }}"

          if [ "$VERSION_TYPE" = "current" ]; then
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            if [[ "$NEW_VERSION" == *-* ]]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ "$VERSION_TYPE" = "rc-bump" ]; then
            # Bump rc number: 4.0.0-rc.0 → 4.0.0-rc.1
            npm version prerelease --preid=rc --no-git-tag-version
          elif [ "$IS_PRERELEASE" = "true" ]; then
            npm version "pre${VERSION_TYPE}" --preid=rc --no-git-tag-version
          else
            npm version "$VERSION_TYPE" --no-git-tag-version
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$NEW_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release tag already exists
        id: check_tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
          VERSION_TYPE: ${{ inputs.version }}
        run: |
          RELEASE_TAG="expo-iap-${NEW_VERSION}"
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            if [ "$VERSION_TYPE" = "current" ]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "⚠️ Tag $RELEASE_TAG already exists. Will reuse existing tag (current mode)."
            else
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "❌ Tag $RELEASE_TAG already exists. Use 'current' to retry this version."
              exit 1
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✓ Tag $RELEASE_TAG does not exist"
          fi

      - name: Prepare package (build + codegen)
        run: bun run prepare

      - name: Commit version update
        if: ${{ inputs.version != 'current' }}
        run: |
          NEW_VERSION="${{ steps.bump.outputs.version }}"
          git add package.json
          git commit -m "chore(release): expo-iap ${NEW_VERSION}"

      - name: Push commit and tags
        if: ${{ inputs.version != 'current' }}
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          STASHED=false
          if ! git diff --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
            git stash push --include-untracked -m "release artifacts"
            STASHED=true
          fi
          git pull --rebase origin main
          if [ "$STASHED" = "true" ]; then
            git stash pop
          fi
          git tag -a "expo-iap-${NEW_VERSION}" -m "Release expo-iap-${NEW_VERSION}"
          git push origin HEAD:main --follow-tags

      - name: Create tag (current version)
        if: ${{ inputs.version == 'current' && steps.check_tag.outputs.exists != 'true' }}
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          TAG_TARGET="HEAD"
          PUBLISHED_GIT_HEAD=$(npm view "expo-iap@$NEW_VERSION" gitHead 2>/dev/null || true)
          if [ -n "$PUBLISHED_GIT_HEAD" ] && git cat-file -e "$PUBLISHED_GIT_HEAD^{commit}" 2>/dev/null; then
            TAG_TARGET="$PUBLISHED_GIT_HEAD"
          fi
          git tag -a "expo-iap-${NEW_VERSION}" "$TAG_TARGET" -m "Release expo-iap-${NEW_VERSION}"
          git push origin "expo-iap-${NEW_VERSION}"

      - name: Resolve symlinks for npm publish
        run: |
          # npm ignores symlinks — replace with real file
          if [ -L openiap-versions.json ]; then
            cp --remove-destination "$(readlink openiap-versions.json)" openiap-versions.json
          fi

      - name: Consumer install smoke test
        run: bun run verify:consumer-install --pack-ignore-scripts

      - name: Ensure npm CLI v11.5.1 or later (required for OIDC)
        run: npm install -g npm@11.5.1

      - name: Check if npm package already published
        id: check_npm
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          if NPM_OUTPUT=$(npm view "expo-iap@$VERSION" version 2>&1); then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ expo-iap@$VERSION already exists on npm"
          elif echo "$NPM_OUTPUT" | grep -qiE 'E404|404 Not Found'; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✓ expo-iap@$VERSION does not exist, will publish"
          else
            echo "❌ Unable to verify expo-iap@$VERSION on npm"
            echo "$NPM_OUTPUT"
            exit 1
          fi

      - name: Publish to npm with OIDC trusted publishing
        if: steps.check_npm.outputs.exists == 'false'
        run: |
          if [ "${{ steps.bump.outputs.is_prerelease }}" = "true" ]; then
            npm publish --tag next --access public --provenance
          else
            npm publish --access public --provenance
          fi

      - name: Generate release notes
        id: release_notes
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          RELEASE_REF="HEAD"
          if git rev-parse "expo-iap-$VERSION" >/dev/null 2>&1; then
            RELEASE_REF="expo-iap-$VERSION"
          fi
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:short)' 'refs/tags/expo-iap-*' | grep -v "$VERSION" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG..$RELEASE_REF" --pretty=format:"- %s ([\`%h\`](https://github.com/hyodotdev/openiap/commit/%H))" -- libraries/expo-iap/ packages/google/ packages/apple/)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No direct code changes — picks up the latest openiap-google / openiap-apple native library updates. See the consolidated release notes for details."
          fi
          cat > /tmp/release-notes.md <<EOF
          ## expo-iap $VERSION

          Expo Modules wrapper for the OpenIAP specification.

          ### What's Changed

          $CHANGELOG

          ### Installation

          \`\`\`bash
          npx expo install expo-iap@$VERSION
          # or
          bun add expo-iap@$VERSION
          \`\`\`

          ### Documentation

          - [Setup guide — Expo](https://openiap.dev/docs/setup/expo)
          - [API reference](https://openiap.dev/docs/apis)
          - [Release notes](https://openiap.dev/docs/updates/releases)

          ### Links

          - [npm](https://www.npmjs.com/package/expo-iap/v/$VERSION)
          - [GitHub (monorepo)](https://github.com/hyodotdev/openiap/tree/main/libraries/expo-iap)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: expo-iap-${{ steps.bump.outputs.version }}
          name: expo-iap ${{ steps.bump.outputs.version }}
          draft: false
          prerelease: ${{ steps.bump.outputs.is_prerelease }}
          body_path: /tmp/release-notes.md
