name: Dependabot — Auto-refresh bun lockfile

# Dependabot doesn't update bun.lock when it bumps a package.json, so the
# kit verify job fails with `lockfile had changes, but lockfile is frozen`.
# This workflow re-runs `bun install` on the PR branch and pushes the
# refreshed bun.lock back so subsequent CI sees a consistent workspace.

on:
  pull_request:
    paths:
      - "package.json"
      - "packages/**/package.json"
      - "libraries/**/package.json"

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    name: Refresh bun.lock
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Run bun install
        id: install
        run: |
          bun install
          if git diff --quiet bun.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push refreshed lockfile
        if: steps.install.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore(deps): refresh bun.lock"
          git push

      - name: Re-trigger kit verify on new commit
        if: steps.install.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # GITHUB_TOKEN pushes don't trigger pull_request events, so
          # dispatch deploy-kit.yml manually on the updated branch tip.
          gh workflow run deploy-kit.yml --ref "$PR_HEAD_REF"
