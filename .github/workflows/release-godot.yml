name: "A. Release: godot-iap"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - current
          - rc-bump
        default: patch
      prerelease:
        description: "Publish as prerelease (-rc.1)"
        required: false
        default: false
        type: boolean
      notarize_macos:
        description: "Include notarized macOS runtime frameworks"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: libraries/godot-iap
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download godot-lib.aar
        run: |
          mkdir -p android/libs
          curl -L -o android/libs/godot-lib.aar \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/godot-lib.4.3.stable.template_release.aar"

      - name: Build Android AAR
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

  validate-ios:
    runs-on: macos-15
    timeout-minutes: 20
    defaults:
      run:
        working-directory: libraries/godot-iap
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify iOS Frameworks
        run: |
          if [ ! -d "addons/godot-iap/bin/ios/GodotIap.framework" ]; then
            echo "Error: iOS frameworks not found"
            exit 1
          fi
          if [ ! -d "addons/godot-iap/bin/ios/SwiftGodotRuntime.framework" ]; then
            echo "Error: iOS SwiftGodotRuntime framework not found"
            exit 1
          fi

      - name: Verify macOS Frameworks
        if: ${{ inputs.notarize_macos }}
        run: |
          if [ ! -d "addons/godot-iap/bin/macos/GodotIap.framework" ]; then
            echo "Error: macOS frameworks not found"
            exit 1
          fi
          if [ ! -d "addons/godot-iap/bin/macos/SwiftGodotRuntime.framework" ]; then
            echo "Error: macOS SwiftGodotRuntime framework not found"
            exit 1
          fi

  deploy:
    needs: [validate-android, validate-ios]
    runs-on: macos-15
    defaults:
      run:
        working-directory: libraries/godot-iap
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Configure Git
        run: |
          git config user.name "godot-iap bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Import Developer ID certificate
        if: ${{ inputs.notarize_macos }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATE_BASE64" ] || [ -z "$CERTIFICATE_PASSWORD" ]; then
            echo "::error::Missing APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 or APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD."
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/godot-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in the imported certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          echo "MACOS_CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Calculate version
        id: version
        run: |
          VERSION_TYPE="${{ inputs.version }}"
          IS_PRERELEASE="${{ inputs.prerelease }}"
          CURRENT_VERSION=$(grep -E '^version=' addons/godot-iap/plugin.cfg | cut -d'"' -f2)

          if [ "$VERSION_TYPE" = "current" ]; then
            echo "VERSION=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            if [[ "$CURRENT_VERSION" == *-* ]]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          BASE_VERSION="${CURRENT_VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          if [ "$VERSION_TYPE" = "rc-bump" ]; then
            RC_NUM=$(echo "$CURRENT_VERSION" | sed -n 's/.*-rc\.\([0-9]*\)/\1/p')
            if [ -z "$RC_NUM" ]; then
              echo "::error::Current version $CURRENT_VERSION is not an rc version."
              exit 1
            fi
            NEW_VERSION="${BASE_VERSION}-rc.$((RC_NUM + 1))"
          elif [ "$IS_PRERELEASE" = "true" ]; then
            case "$VERSION_TYPE" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-rc.1"
          else
            # Stable release — if current version is RC, strip prerelease without bumping
            IS_RC=$(echo "$CURRENT_VERSION" | grep -c '\-rc\.' || true)
            if [ "$IS_RC" -gt 0 ] && [ "$VERSION_TYPE" = "patch" ]; then
              NEW_VERSION="${BASE_VERSION}"
            else
              case "$VERSION_TYPE" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          echo "VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$NEW_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release tag already exists
        id: check_tag
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          VERSION_TYPE: ${{ inputs.version }}
        run: |
          RELEASE_TAG="godot-iap-${VERSION}"
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            if [ "$VERSION_TYPE" = "current" ]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "⚠️ Tag $RELEASE_TAG already exists. Will reuse existing tag (current mode)."
            else
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "❌ Tag $RELEASE_TAG already exists. Use 'current' to retry this version."
              exit 1
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✓ Tag $RELEASE_TAG does not exist"
          fi

      - name: Checkout release tag (current version)
        if: ${{ inputs.version == 'current' && steps.check_tag.outputs.exists == 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          RELEASE_TAG="godot-iap-${VERSION}"
          git checkout "$RELEASE_TAG"

      - name: Update version in plugin.cfg
        if: ${{ inputs.version != 'current' }}
        run: |
          sed -i '' 's/^version=.*/version="${{ steps.version.outputs.VERSION }}"/' addons/godot-iap/plugin.cfg

      - name: Sync OpenIAP versions
        run: |
          chmod +x scripts/sync-versions.sh
          ./scripts/sync-versions.sh

      - name: Download godot-lib.aar
        run: |
          mkdir -p android/libs
          curl -L -o android/libs/godot-lib.aar \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/godot-lib.4.3.stable.template_release.aar"

      - name: Build Android AAR
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare addon directory
        run: |
          mkdir -p dist/addons/godot-iap/android
          mkdir -p dist/addons/godot-iap/bin/ios
          mkdir -p dist/addons/godot-iap/scripts

          cp addons/godot-iap/*.gd dist/addons/godot-iap/
          cp addons/godot-iap/plugin.cfg dist/addons/godot-iap/
          cp scripts/fix_ios_embed.sh dist/addons/godot-iap/scripts/
          chmod +x dist/addons/godot-iap/scripts/fix_ios_embed.sh

          cp android/build/outputs/aar/godot-iap-release.aar dist/addons/godot-iap/android/GodotIap.release.aar
          cp android/build/outputs/aar/godot-iap-release.aar dist/addons/godot-iap/android/GodotIap.debug.aar

          ./scripts/write-gdap.sh dist/addons/godot-iap/android/GodotIap.gdap

          cp -R addons/godot-iap/bin/ios/GodotIap.framework dist/addons/godot-iap/bin/ios/
          cp -R addons/godot-iap/bin/ios/SwiftGodotRuntime.framework dist/addons/godot-iap/bin/ios/

          if [ "${{ inputs.notarize_macos }}" = "true" ]; then
            mkdir -p dist/addons/godot-iap/bin/macos
            cp -R addons/godot-iap/bin/macos/GodotIap.framework dist/addons/godot-iap/bin/macos/
            cp -R addons/godot-iap/bin/macos/SwiftGodotRuntime.framework dist/addons/godot-iap/bin/macos/
            lipo dist/addons/godot-iap/bin/macos/GodotIap.framework/GodotIap -verify_arch arm64
            lipo dist/addons/godot-iap/bin/macos/SwiftGodotRuntime.framework/SwiftGodotRuntime -verify_arch arm64
            codesign --force --deep --sign "$MACOS_CODESIGN_IDENTITY" --options runtime --timestamp dist/addons/godot-iap/bin/macos/SwiftGodotRuntime.framework
            codesign --force --deep --sign "$MACOS_CODESIGN_IDENTITY" --options runtime --timestamp dist/addons/godot-iap/bin/macos/GodotIap.framework
            codesign --verify --deep --strict --verbose=2 dist/addons/godot-iap/bin/macos/SwiftGodotRuntime.framework
            codesign --verify --deep --strict --verbose=2 dist/addons/godot-iap/bin/macos/GodotIap.framework
            xattr -dr com.apple.quarantine dist/addons/godot-iap || true

            MACOS_X86_LIBRARY=""
            MACOS_X86_DEPENDENCY=""
            if lipo dist/addons/godot-iap/bin/macos/GodotIap.framework/GodotIap -verify_arch x86_64 2>/dev/null && \
               lipo dist/addons/godot-iap/bin/macos/SwiftGodotRuntime.framework/SwiftGodotRuntime -verify_arch x86_64 2>/dev/null; then
              MACOS_X86_LIBRARY='macos.x86_64 = "macos/GodotIap.framework/GodotIap"'
              MACOS_X86_DEPENDENCY='macos.x86_64 = {"macos/SwiftGodotRuntime.framework/SwiftGodotRuntime": ""}'
            fi

            cat > dist/addons/godot-iap/bin/godot_iap.gdextension << EOF
          [configuration]
          entry_symbol = "godot_iap_entry_point"
          compatibility_minimum = "4.3"
          supported_platforms = ["ios", "macos"]

          [libraries]
          ios.arm64 = "ios/GodotIap.framework/GodotIap"
          macos.arm64 = "macos/GodotIap.framework/GodotIap"
          $MACOS_X86_LIBRARY

          [dependencies]
          ios.arm64 = {"ios/SwiftGodotRuntime.framework/SwiftGodotRuntime": ""}
          macos.arm64 = {"macos/SwiftGodotRuntime.framework/SwiftGodotRuntime": ""}
          $MACOS_X86_DEPENDENCY
          EOF
          else
            cat > dist/addons/godot-iap/bin/godot_iap.gdextension << 'EOF'
          [configuration]
          entry_symbol = "godot_iap_entry_point"
          compatibility_minimum = "4.3"
          supported_platforms = ["ios"]

          [libraries]
          ios.arm64 = "ios/GodotIap.framework/GodotIap"

          [dependencies]
          ios.arm64 = {"ios/SwiftGodotRuntime.framework/SwiftGodotRuntime": ""}
          EOF
          fi

      - name: Create release zip
        run: |
          cd dist
          zip -yr ../godot-iap-${{ steps.version.outputs.VERSION }}.zip addons

      - name: Notarize macOS frameworks
        if: ${{ inputs.notarize_macos }}
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          if [ -z "$APP_STORE_CONNECT_API_KEY_BASE64" ] || \
             [ -z "$APP_STORE_CONNECT_API_KEY_ID" ] || \
             [ -z "$APP_STORE_CONNECT_API_ISSUER_ID" ]; then
            echo "::error::Missing App Store Connect API key secrets for notarization."
            exit 1
          fi

          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          NOTARY_ZIP="$RUNNER_TEMP/godot-iap-macos-notary.zip"

          cd dist/addons/godot-iap/bin
          zip -yr "$NOTARY_ZIP" macos
          cd ../../../..

          xcrun notarytool submit \
            "$NOTARY_ZIP" \
            --key "$API_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple -v dist/addons/godot-iap/bin/macos/SwiftGodotRuntime.framework
          xcrun stapler staple -v dist/addons/godot-iap/bin/macos/GodotIap.framework
          xcrun stapler validate -v dist/addons/godot-iap/bin/macos/SwiftGodotRuntime.framework
          xcrun stapler validate -v dist/addons/godot-iap/bin/macos/GodotIap.framework

          rm godot-iap-${{ steps.version.outputs.VERSION }}.zip
          cd dist
          zip -yr ../godot-iap-${{ steps.version.outputs.VERSION }}.zip addons

      - name: Verify release zip
        run: |
          VERIFY_DIR="$(mktemp -d)"
          unzip -q godot-iap-${{ steps.version.outputs.VERSION }}.zip -d "$VERIFY_DIR"
          test -x "$VERIFY_DIR/addons/godot-iap/scripts/fix_ios_embed.sh"
          test -d "$VERIFY_DIR/addons/godot-iap/bin/ios/GodotIap.framework"
          test -d "$VERIFY_DIR/addons/godot-iap/bin/ios/SwiftGodotRuntime.framework"
          if [ "${{ inputs.notarize_macos }}" = "true" ]; then
            grep -q '^supported_platforms = \["ios", "macos"\]' "$VERIFY_DIR/addons/godot-iap/bin/godot_iap.gdextension"
            grep -q '^macos\.' "$VERIFY_DIR/addons/godot-iap/bin/godot_iap.gdextension"
            codesign --verify --deep --strict --verbose=2 "$VERIFY_DIR/addons/godot-iap/bin/macos/SwiftGodotRuntime.framework"
            codesign --verify --deep --strict --verbose=2 "$VERIFY_DIR/addons/godot-iap/bin/macos/GodotIap.framework"
            xcrun stapler validate -v "$VERIFY_DIR/addons/godot-iap/bin/macos/SwiftGodotRuntime.framework"
            xcrun stapler validate -v "$VERIFY_DIR/addons/godot-iap/bin/macos/GodotIap.framework"
            spctl -a -vv --type execute "$VERIFY_DIR/addons/godot-iap/bin/macos/SwiftGodotRuntime.framework"
            spctl -a -vv --type execute "$VERIFY_DIR/addons/godot-iap/bin/macos/GodotIap.framework"
          else
            grep -q '^supported_platforms = \["ios"\]' "$VERIFY_DIR/addons/godot-iap/bin/godot_iap.gdextension"
            test ! -d "$VERIFY_DIR/addons/godot-iap/bin/macos"
            if grep -q '^macos\.' "$VERIFY_DIR/addons/godot-iap/bin/godot_iap.gdextension"; then
              echo "Error: default release zip must not declare macOS libraries"
              exit 1
            fi
          fi

      - name: Commit version update and tag
        if: ${{ inputs.version != 'current' }}
        run: |
          git add addons/godot-iap/plugin.cfg
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): godot-iap ${{ steps.version.outputs.VERSION }}"
          fi
          STASHED=false
          if ! git diff --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
            git stash push --include-untracked -m "release artifacts"
            STASHED=true
          fi
          git pull --rebase origin main
          if [ "$STASHED" = "true" ]; then
            git stash pop
          fi
          git tag -a godot-iap-${{ steps.version.outputs.VERSION }} -m "Release godot-iap-${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main --follow-tags

      - name: Create tag (current version)
        if: ${{ inputs.version == 'current' && steps.check_tag.outputs.exists != 'true' }}
        run: |
          git tag -a godot-iap-${{ steps.version.outputs.VERSION }} -m "Release godot-iap-${{ steps.version.outputs.VERSION }}"
          git push origin godot-iap-${{ steps.version.outputs.VERSION }}

      - name: Generate release notes
        id: release_notes
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          RELEASE_REF="HEAD"
          if git rev-parse "godot-iap-$VERSION" >/dev/null 2>&1; then
            RELEASE_REF="godot-iap-$VERSION"
          fi
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:short)' 'refs/tags/godot-iap-*' | grep -v "$VERSION" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG..$RELEASE_REF" --pretty=format:"- %s ([\`%h\`](https://github.com/hyodotdev/openiap/commit/%H))" -- libraries/godot-iap/ packages/google/)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No direct code changes — picks up the latest openiap-google native library updates. See the consolidated release notes for details."
          fi
          cat > /tmp/release-notes.md <<EOF
          ## godot-iap $VERSION

          Godot 4.x addon for the OpenIAP specification (iOS GDExtension + Android AAR plugin).

          ### What's Changed

          $CHANGELOG

          ### Installation

          Download \`godot-iap-$VERSION.zip\` from the Assets section below and extract into your project's \`addons/\` directory, or install via the Godot Asset Library.

          Minimum Godot version: **4.3**.

          ### Documentation

          - [Setup guide — Godot](https://openiap.dev/docs/setup/godot)
          - [API reference](https://openiap.dev/docs/apis)
          - [Release notes](https://openiap.dev/docs/updates/releases)

          ### Links

          - [Download ZIP](https://github.com/hyodotdev/openiap/releases/download/godot-iap-$VERSION/godot-iap-$VERSION.zip)
          - [GitHub (monorepo)](https://github.com/hyodotdev/openiap/tree/main/libraries/godot-iap)
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: godot-iap-${{ steps.version.outputs.VERSION }}
          name: godot-iap ${{ steps.version.outputs.VERSION }}
          files: libraries/godot-iap/godot-iap-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          body_path: /tmp/release-notes.md
