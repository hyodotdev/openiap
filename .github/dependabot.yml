version: 2
updates:
  # packages/kit — receipt-validation SaaS app
  - package-ecosystem: "npm"
    directory: "/packages/kit"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "openiap-kit"
      - "📦 update packages"
    groups:
      kit-convex:
        patterns:
          - "convex"
          - "@convex-dev/*"
      kit-react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      kit-dev-dependencies:
        dependency-type: "development"
    ignore:
      # Major bumps often need code migration work; review manually
      # rather than letting Dependabot flood the queue.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by kit's deploy workflow
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "💨 ci"
      - "📦 update packages"

  # packages/kit Dockerfile base image
  - package-ecosystem: "docker"
    directory: "/packages/kit"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "openiap-kit"
      - "👷‍♀️ build"
      - "📦 update packages"
