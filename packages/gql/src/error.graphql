# Error handling definitions for OpenIAP

# Unified error codes surfaced by the OpenIAP APIs
enum ErrorCode {
  Unknown
  UserCancelled
  UserError
  ItemUnavailable
  RemoteError
  NetworkError
  ServiceError
  # @deprecated Use PurchaseVerificationFailed instead
  ReceiptFailed
  # @deprecated Use PurchaseVerificationFinished instead
  ReceiptFinished
  # @deprecated Use PurchaseVerificationFinishFailed instead
  ReceiptFinishedFailed
  PurchaseVerificationFailed
  PurchaseVerificationFinished
  PurchaseVerificationFinishFailed
  NotPrepared
  NotEnded
  AlreadyOwned
  DeveloperError
  BillingResponseJsonParseError
  DeferredPayment
  Interrupted
  IapNotAvailable
  PurchaseError
  SyncError
  TransactionValidationFailed
  ActivityUnavailable
  AlreadyPrepared
  Pending
  ConnectionClosed
  InitConnection
  ServiceDisconnected
  ServiceTimeout
  QueryProduct
  SkuNotFound
  SkuOfferMismatch
  ItemNotOwned
  BillingUnavailable
  FeatureNotSupported
  EmptySkuList
  DuplicatePurchase
}

# Purchase error payload delivered through listeners and API responses
type PurchaseError {
  code: ErrorCode!
  message: String!
  productId: String
  # Raw diagnostic text from the underlying billing layer, when available.
  # On Android this mirrors BillingResult.debugMessage; on iOS this is the
  # StoreKit error's localizedDescription (or equivalent). May be null.
  debugMessage: String
}
